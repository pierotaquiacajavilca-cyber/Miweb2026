  <section id="buzon-sugerencias">
  <h3>¡Déjanos tu opinión!</h3>
  <form id="form-sugerencia">
    <input type="text" id="nombre" placeholder="Tu nombre (opcional)" />
    
    <select id="categoria">
      <option value="mejora">Sugerencia de mejora</option>
      <option value="error">Reportar un error</option>
      <option value="felicitacion">Felicitación</option>
    </select>

    <textarea id="mensaje" placeholder="Escribe aquí tu sugerencia..." required></textarea>
    
    <button type="submit">Enviar sugerencia</button>
  </form>
  
  <div id="mensaje-exito" style="display:none;">
    <p>✅ ¡Gracias! Tu comentario ha sido recibido.</p>
  </div>
